name: Xournal++

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-xournalpp:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup environment
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          rsync python3-yaml python3-jsonschema \
          devscripts build-essential fakeroot dpkg-dev \
          equivs ca-certificates git gnupg

        cat > /etc/apt/sources.list.d/ubuntu-src.sources << EOF
        Types: deb-src
        URIs: http://us.archive.ubuntu.com/ubuntu/
        Suites: resolute resolute-updates resolute-backports resolute-proposed
        Components: main restricted universe multiverse
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        EOF

        apt-get update
        apt-get build-dep -y xournalpp

        apt-get source xournalpp

    - name: Build Xournal++
      run: |

        SRCDIR="$(ls -d xournalpp-*/ | head -n 1)"
        echo "SRCDIR=${SRCDIR}" >> $GITHUB_ENV
        DEBEMAIL=kazam0180@proton.me
        echo "DEBEMAIL=$DEBEMAIL" >> $GITHUB_ENV

        cd "$SRCDIR"
        patch -p1 < ../patches/xournalpp/xdg_config_patch.diff

        # Update changelog
        dch --local "~ukazamos" "Apply XDG Config Dirs patch [automated CI build]"

        dpkg-buildpackage -us -uc -b

        cd ..
        ls -lh *.deb
        mkdir -p artifacts
        mv *.deb artifacts/ 2>/dev/null || echo "No deb files found"

        echo "Build completed"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: xournalpp-deb
        path: artifacts/*xournalpp*.deb
        retention-days: 7

    - name: Upload debug artifact
      uses: actions/upload-artifact@v6
      with:
        name: xournalpp-dbg
        path: artifacts/xournalpp-dbg*.deb
        retention-days: 7

  publish-deb:
    runs-on: ubuntu-latest
    needs: build-xournalpp

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v6
      with:
        name: xournalpp-deb

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends reprepro gnupg2 tree git

    - name: Setup Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Setup GPG
      run: |
        mkdir -p ~/.gnupg
        chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

        # Import GPG key
        echo "${{ secrets.GPG_PKEY }}" | base64 -d > /tmp/private.key
        gpg --batch --import /tmp/private.key
        rm /tmp/private.key

        echo "GPG_KEY_ID=91016B841FE42FCF66EC4CC960617F7CCAEE2C8A" >> $GITHUB_ENV

        echo "key check"
        gpg --list-secret-keys --keyid-format LONG

    - name: Setup reprepro and publish
      run: |

        tree -L 3

        GPG_PATH=$(which gpg)
        echo "Original GPG at: $GPG_PATH"

        sudo mv "$GPG_PATH" "${GPG_PATH}_original"

        # Create wrapper script that provides passphrase automatically
        sudo tee "$GPG_PATH" > /dev/null <<'WRAPPER'
        #!/bin/bash
        echo "${{ secrets.GPG_PASS }}" | /usr/bin/gpg_original --batch --pinentry-mode loopback --passphrase-fd 0 "$@"

        WRAPPER
        sudo chmod +x $GPG_PATH

        echo "test" | gpg --armor --detach-sign \
          --default-key "$GPG_KEY_ID" --output /tmp/test.sig || {
          echo "GPG wrapper test failed"
          exit 1
        }
        echo "GPG wrapper working correctly"

        find pool -name "*xournalpp_*.deb" -exec rm {} \;
        reprepro -b . export
        reprepro -b . includedeb voltage *xournalpp*.deb
        find pool -name "*.dsc" -exec reprepro -b . includedsc voltage {} \;
        find pool -name "*.deb" -exec reprepro -b . includedeb voltage {} \;

        rm xournalpp_*.deb

        # Verify files
        ls -l dists/voltage/
        cat dists/voltage/main/binary-amd64/Packages

        git status

    - name: Commit and Push
      run: |
        set -euo pipefail

        # safe stage of only the directories we expect to change
        git add -- dists/ pool/ conf/

        # Detect staged deletions (abort if any — safety)
        DELETIONS=$(git status --porcelain | awk '/^ D/ {count++} END{print count+0}')
        if [ "$DELETIONS" -gt 0 ]; then
          echo "ERROR: Detected $DELETIONS staged deletions — aborting to avoid wiping repo"
          git status --porcelain
          exit 1
        fi

        if git diff --cached --quiet; then
          echo "No repository changes to commit."
          exit 0
        fi

        # create a unique branch name
        BRANCH="ci/xournalpp-update-${GITHUB_RUN_ID}-$(date +%s)"
        echo "Creating branch: $BRANCH"

        # create branch from current main (checkout ensures we are on a branch)
        git checkout -b "$BRANCH"

        # commit
        git commit -m "CI: add/update xournalpp package (Build ${GITHUB_RUN_ID})"

        # push the new branch up
        git push --set-upstream origin "$BRANCH"

        echo "Pushed branch $BRANCH"
