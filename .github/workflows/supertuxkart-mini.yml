name: SuperTuxKart Mini

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-supertuxkart-mini:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup environment
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          sed coreutils unar unzip tar wget tree \
          devscripts fakeroot dpkg-dev

    - name: Build Package
      run: |

        DEBEMAIL=kazam0180@proton.me
        echo "DEBEMAIL=$DEBEMAIL" >> $GITHUB_ENV
        export latestTag=1.5

        wget -O stk-linux.tar.gz https://github.com/supertuxkart/stk-code/releases/download/1.5/SuperTuxKart-1.5-linux-x86_64.tar.gz 2> /dev/null
        tar -xvf stk-linux.tar.gz > /dev/null
        
        mkdir -p stk
        
        mv SuperTuxKart-1.5-linux-x86_64/bin stk/
        mv SuperTuxKart-1.5-linux-x86_64/lib stk/
        
        rm -rf SuperTuxKart-1.5-linux-x86_64 stk-linux*

        mkdir -p deb-pkg
        mkdir -p deb-pkg/DEBIAN
        mkdir -p deb-pkg/usr/bin
        mkdir -p deb-pkg/usr/share/applications
        mkdir -p deb-pkg/usr/share/supertuxkart-mini

        mv stk/bin deb-pkg/usr/share/supertuxkart-mini/
        mv stk/lib deb-pkg/usr/share/supertuxkart-mini/

        cat > deb-pkg/usr/share/applications/supertuxkart-mini.desktop << 'EOF'
        [Desktop Entry]
        Name=SuperTuxKart (Mini Version)
        Icon=supertuxkart
        StartupWMClass=supertuxkart
        Exec=supertuxkart-mini
        Terminal=false
        StartupNotify=false
        Type=Application
        Categories=Game;ArcadeGame;
        Keywords=tux;game;race;
        PrefersNonDefaultGPU=true
        EOF

        cat > deb-pkg/usr/bin/supertuxkart-mini << 'EOF'
        #!/bin/sh

        export SYSTEM_LD_LIBRARY_PATH="$LD_LIBRARY_PATH"

        export SUPERTUXKART_DATADIR="/usr/share/supertuxkart-mini"
        export SUPERTUXKART_ASSETS_DIR="/usr/share/supertuxkart-mini/data/"

        cd $SUPERTUXKART_DATADIR

        export LD_LIBRARY_PATH="$SUPERTUXKART_DATADIR/lib:$LD_LIBRARY_PATH"
        "$SUPERTUXKART_DATADIR/bin/supertuxkart" "$@"

        EOF

        chmod 0755 deb-pkg/usr/bin/supertuxkart-mini

        cat > deb-pkg/DEBIAN/control << EOF
        Package: supertuxkart-mini
        Version: $latestTag
        Architecture: amd64
        Section: x11
        Maintainer: Kazam <kazam0180@proton.me>
        Priority: optional
        Depends: wget, unzip, libangelscript2.38.0 (>= 2.38.0+ds), libc6 (>= 2.38), libgcc-s1 (>= 3.3.1), libmcpp0, libsquish0 (>= 1.15), libstdc++6 (>= 14)
        Installed-Size: 261076
        Description: A mini version of SuperTuxKart
         Only contains essential assets from the Android version of STK

        EOF

        cat > deb-pkg/DEBIAN/postinst << 'EOF'
        #!/bin/sh
        set -e
        
        DATADIR="/usr/share/supertuxkart-mini"
        APK_URL="https://github.com/supertuxkart/stk-code/releases/download/1.5/SuperTuxKart-1.5.apk"
        TMP_APK="$(mktemp /tmp/stk-XXXXXX.apk)"
        
        echo "Downloading SuperTuxKart assets..."
        if ! wget -q -O "$TMP_APK" "$APK_URL"; then
            echo "ERROR: Failed to download STK assets from $APK_URL" >&2
            rm -f "$TMP_APK"
            exit 1
        fi
        
        echo "Extracting assets..."
        mkdir -p "$DATADIR/data"
        if ! unzip -q "$TMP_APK" "assets/data/*" -d /tmp/stk-extract; then
            echo "ERROR: Failed to extract APK" >&2
            rm -f "$TMP_APK"
            rm -rf /tmp/stk-extract
            exit 1
        fi
        
        mv /tmp/stk-extract/assets/data/* "$DATADIR/data/"
        rm -f "$TMP_APK"
        rm -rf /tmp/stk-extract

        chmod -R a+rX "$DATADIR/data"
        echo "SuperTuxKart assets installed."
        EOF

        chmod 0755 deb-pkg/DEBIAN/postinst

        cat > deb-pkg/DEBIAN/postrm << 'EOF'
        #!/bin/sh
        set -e
        rm -rf /usr/share/supertuxkart-mini
        EOF

        chmod 0755 deb-pkg/DEBIAN/postrm

        # tree -I '*.png|*.ogg|*.spm|*.xml|*.jpg|stklib*|*.music' deb-pkg

        dpkg-deb --build deb-pkg supertuxkart-mini_$latestTag_amd64.deb

        # Move artifacts
        mkdir -p artifacts
        mv supertuxkart-mini_$latestTag_amd64.deb artifacts/ 2>/dev/null || echo "No deb files found"
        echo "$latestTag" >> artifacts/tag

        echo "Build completed"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: supertuxkart-mini-deb
        path: artifacts/supertuxkart-mini*.deb
        retention-days: 7

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: supertuxkart-mini-tag
        path: artifacts/tag
        retention-days: 7

  publish-deb:
    runs-on: ubuntu-latest
    needs: build-supertuxkart-mini

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: supertuxkart-mini-deb

    - name: Download tag
      uses: actions/download-artifact@v6
      with:
        name: supertuxkart-mini-tag

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends reprepro gnupg2 tree git

    - name: Setup Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Setup GPG
      run: |
        mkdir -p ~/.gnupg
        chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

        # Import GPG key
        echo "${{ secrets.GPG_PKEY }}" | base64 -d > /tmp/private.key
        gpg --batch --import /tmp/private.key
        rm /tmp/private.key

        echo "GPG_KEY_ID=91016B841FE42FCF66EC4CC960617F7CCAEE2C8A" >> $GITHUB_ENV

        echo "key check"
        gpg --list-secret-keys --keyid-format LONG

    - name: Setup reprepro and publish
      run: |

        tree -L 3

        GPG_PATH=$(which gpg)
        echo "Original GPG at: $GPG_PATH"

        sudo mv "$GPG_PATH" "${GPG_PATH}_original"

        # Create wrapper script that provides passphrase automatically
        sudo tee "$GPG_PATH" > /dev/null <<'WRAPPER'
        #!/bin/bash
        echo "${{ secrets.GPG_PASS }}" | /usr/bin/gpg_original --batch --pinentry-mode loopback --passphrase-fd 0 "$@"

        WRAPPER
        sudo chmod +x $GPG_PATH

        echo "test" | gpg --armor --detach-sign \
          --default-key "$GPG_KEY_ID" --output /tmp/test.sig || {
          echo "GPG wrapper test failed"
          exit 1
        }
        echo "GPG wrapper working correctly"

        find pool -name "supertuxkart-mini*.deb" -exec rm {} \;
        reprepro -b . export
        reprepro -b . includedeb voltage supertuxkart-mini*.deb
        find pool -name "*.dsc" -exec reprepro -b . includedsc voltage {} \;
        find pool -name "*.deb" -exec reprepro -b . includedeb voltage {} \;

        rm supertuxkart-mini*.deb
        echo "latestTag=$(cat tag)" >> $GITHUB_ENV
        rm tag

        # Verify files
        ls -l dists/voltage/
        cat dists/voltage/main/binary-amd64/Packages

        git status

    - name: Commit and Push
      run: |
        set -euo pipefail

        # safe stage of only the directories we expect to change
        git add -- dists/ pool/ conf/

        # Detect staged deletions (abort if any — safety)
        DELETIONS=$(git status --porcelain | awk '/^ D/ {count++} END{print count+0}')
        if [ "$DELETIONS" -gt 0 ]; then
          echo "ERROR: Detected $DELETIONS staged deletions — aborting to avoid wiping repo"
          git status --porcelain
          exit 1
        fi

        if git diff --cached --quiet; then
          echo "No repository changes to commit."
          exit 0
        fi

        # create a unique branch name
        BRANCH="ci/supertuxkart-mini-update-$latestTag-${GITHUB_RUN_ID}"
        echo "Creating branch: $BRANCH"

        # create branch from current main (checkout ensures we are on a branch)
        git checkout -b "$BRANCH"

        # commit
        git commit -m "CI: add/update supertuxkart-mini package (Build ${GITHUB_RUN_ID})"

        # push the new branch up
        git push --set-upstream origin "$BRANCH"

        echo "Pushed branch $BRANCH"
