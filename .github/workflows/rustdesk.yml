name: RustDesk

on:
  workflow_dispatch:
  # Consider uncommenting the line below to run this automatically (e.g., daily at midnight)
  # schedule:
  #   - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  publish-deb:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends reprepro gnupg2 tree git wget curl jq

    - name: Setup Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Setup GPG
      run: |
        mkdir -p ~/.gnupg
        chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

        # Import GPG key
        echo "${{ secrets.GPG_PKEY }}" | base64 -d > /tmp/private.key
        gpg --batch --import /tmp/private.key
        rm /tmp/private.key

        echo "GPG_KEY_ID=91016B841FE42FCF66EC4CC960617F7CCAEE2C8A" >> $GITHUB_ENV

        echo "key check"
        gpg --list-secret-keys --keyid-format LONG

    - name: Setup reprepro and publish
      run: |
        tree -L 3

        GPG_PATH=$(which gpg)
        echo "Original GPG at: $GPG_PATH"

        sudo mv "$GPG_PATH" "${GPG_PATH}_original"

        # Create wrapper script that provides passphrase automatically
        sudo tee "$GPG_PATH" > /dev/null <<'WRAPPER'
        #!/bin/bash
        echo "${{ secrets.GPG_PASS }}" | /usr/bin/gpg_original --batch --pinentry-mode loopback --passphrase-fd 0 "$@"
        WRAPPER
        sudo chmod +x $GPG_PATH

        echo "test" | gpg --armor --detach-sign \
          --default-key "$GPG_KEY_ID" --output /tmp/test.sig || {
          echo "GPG wrapper test failed"
          exit 1
        }
        echo "GPG wrapper working correctly"

        # Dynamically fetch the latest release tag from GitHub API
        LATEST_TAG=$(curl -s https://api.github.com/repos/rustdesk/rustdesk/releases/latest | jq -r .tag_name)
        
        # Strip a leading 'v' if present (e.g., 'v1.4.7' -> '1.4.7') for clean Debian package naming
        VERSION=${LATEST_TAG#v}
        
        echo "Fetching RustDesk version: $VERSION (Tag: $LATEST_TAG)"

        wget -O "rustdesk-${VERSION}-x86_64.deb" "https://github.com/rustdesk/rustdesk/releases/download/${LATEST_TAG}/rustdesk-${VERSION}-x86_64.deb"

        find pool -name "rustdesk*.deb" -exec rm {} \;
        reprepro -b . export
        reprepro -b . includedeb voltage "rustdesk-${VERSION}-x86_64.deb"
        find pool -name "*.dsc" -exec reprepro -b . includedsc voltage {} \;
        find pool -name "*.deb" -exec reprepro -b . includedeb voltage {} \;

        rm "rustdesk-${VERSION}-x86_64.deb"
        
        # Save to environment for the commit step
        echo "latestTag=$VERSION" >> $GITHUB_ENV

        # Verify files
        ls -l dists/voltage/
        cat dists/voltage/main/binary-amd64/Packages

        git status

    - name: Commit and Push
      run: |
        set -euo pipefail

        # safe stage of only the directories we expect to change
        git add -- dists/ pool/ conf/

        # Detect staged deletions (abort if any — safety)
        DELETIONS=$(git status --porcelain | awk '/^ D/ {count++} END{print count+0}')
        if [ "$DELETIONS" -gt 0 ]; then
          echo "ERROR: Detected $DELETIONS staged deletions — aborting to avoid wiping repo"
          git status --porcelain
          exit 1
        fi

        if git diff --cached --quiet; then
          echo "No repository changes to commit. Version $latestTag is already up to date."
          exit 0
        fi

        # create a unique branch name using the newly fetched dynamic tag
        BRANCH="ci/rustdesk-update-$latestTag-${GITHUB_RUN_ID}"
        echo "Creating branch: $BRANCH"

        # create branch from current main (checkout ensures we are on a branch)
        git checkout -b "$BRANCH"

        # commit
        git commit -m "CI: add/update rustdesk package to $latestTag (Build ${GITHUB_RUN_ID})"

        # push the new branch up
        git push --set-upstream origin "$BRANCH"

        echo "Pushed branch $BRANCH"
